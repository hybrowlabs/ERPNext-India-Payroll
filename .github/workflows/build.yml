name: Build

on:
  push:
    branches:
      - main
      - version-16
      - "v2/dev/**"
      - "refactor/**"
      - "feat/**"
      - "fix/**"
  pull_request:
    branches:
      - main
      - version-16
      - "v2/dev/**"


jobs:
  build:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    permissions: read-all
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for accurate SonarQube blame/analysis
      - uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      # Uncomment to enforce Quality Gate as a PR merge gate:
      # - uses: sonarsource/sonarqube-quality-gate-action@master
      #   timeout-minutes: 5
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
