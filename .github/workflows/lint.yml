name: Lint

on:
  push:
    branches:
      - main
      - version-16
      - "v2/dev/**"
      - "refactor/**"
      - "feat/**"
      - "fix/**"
  pull_request:
    branches:
      - main
      - version-16
      - "v2/dev/**"

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Lint (ruff check)
        run: ruff check . --output-format=github

      - name: Format check (ruff format)
        run: ruff format --check .
